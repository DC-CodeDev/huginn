<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F1117" />
    <title>Huginn sin conexión</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.14);
        --text: #f4f7fb;
        --muted: rgba(244, 247, 251, 0.68);
        --accent: #76e0d6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(118, 224, 214, 0.18), transparent 34%),
          linear-gradient(180deg, #131722 0%, var(--bg) 60%);
        color: var(--text);
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 32px 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.8rem, 5vw, 2.3rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.55;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--accent);
        color: #081013;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Huginn está sin conexión</h1>
      <p>Necesitas conexión para cargar y guardar tus boards.</p>
      <button type="button" id="retry">Reintentar</button>
    </main>
    <script>
      document.getElementById("retry")?.addEventListener("click", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
