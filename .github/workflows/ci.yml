name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Frontend: Node + build + tests ──────────────────────────

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (genera dist/)
        run: npm run build

      - name: Copy build output para static serving del backend
        run: |
          mkdir -p nodeboard-backend/app/static
          cp -r dist/* nodeboard-backend/app/static/

      - name: Run frontend tests (vitest)
        run: npm test

      # ── Backend: Python + tests ─────────────────────────────────

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nodeboard-backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r nodeboard-backend/requirements.txt

      - name: Verificar que static/ existe para el catch-all test
        run: |
          test -d nodeboard-backend/app/static
          echo "static/ OK — test_catch_all_ordering_at_runtime podrá correr como PASS real"

      - name: Run backend tests (pytest con --runxfail)
        run: pytest nodeboard-backend/tests --runxfail -v
        env:
          PYTHONPATH: nodeboard-backend
